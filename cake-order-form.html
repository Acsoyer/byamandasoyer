<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>byamandasoyer — Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F6F3; --card:#FFFFFF; --ink:#4A4446; --ink-soft:#8C8C8C; --ink-faint:#B7B1AC;
    --line:#E6E2DC; --brand:#73082C; --accent:#73082C; --accent-soft:#F2E2E8; --pistachio:#73082C;
    --maroon:#73082C; --shadow-sm:0 3px 12px rgba(20,20,20,.06); --radius:20px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);font-family:'Montserrat',system-ui,sans-serif;color:var(--ink);margin:0}
  #phone{position:relative;width:100%;height:100vh;height:100dvh;background:var(--bg);overflow:hidden}
  @media (min-width:441px){
    body{background:#ECEAE5;display:flex;align-items:center;justify-content:center}
    #phone{width:393px;height:852px;max-height:96vh;border-radius:30px;box-shadow:0 18px 50px rgba(20,20,20,.12)}
  }

  #screen{position:absolute;inset:0;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top)}

  /* Top */
  #topbar{padding:calc(14px + env(safe-area-inset-top)) 20px 8px;flex:0 0 auto}
  @media (min-width:441px){#topbar{padding-top:22px}}
  .mini-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;font-size:12px;font-weight:600;letter-spacing:.03em}
  body.embed .mini-row{display:none}
  body.embed #topbar{padding-top:calc(12px + env(safe-area-inset-top))}
  .mini-row .stepno{color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .mini-row .restart{color:var(--accent);background:none;border:none;font-family:inherit;font-weight:600;font-size:12px;cursor:pointer;padding:4px 2px;display:flex;align-items:center;gap:4px}
  .bar-row{display:flex;align-items:center;gap:12px}
  #back{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--card);
    display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--ink);flex:0 0 auto;cursor:pointer;transition:transform .15s}
  #back:active{transform:scale(.92)}
  #back[hidden]{visibility:hidden}
  #progress{flex:1;height:7px;background:var(--line);border-radius:99px;overflow:hidden}
  #progress > i{display:block;height:100%;width:0;background:linear-gradient(90deg,#A64A67,var(--accent));border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
  #cart{display:flex;align-items:center;gap:7px;background:var(--brand);color:#fff;border-radius:99px;
    padding:8px 13px 8px 11px;font-weight:600;font-size:14px;flex:0 0 auto;box-shadow:var(--shadow-sm)}
  #cart .amt{font-variant-numeric:tabular-nums}
  #cart .pre{font-size:11px;opacity:.7;font-weight:500;margin-right:1px}
  @keyframes bump{0%{transform:scale(1)}35%{transform:scale(1.16) rotate(-3deg)}100%{transform:scale(1)}}
  #cart.bump{animation:bump .42s cubic-bezier(.34,1.56,.64,1)}
  .spark{position:absolute;pointer-events:none;font-size:13px;animation:fly .7s ease-out forwards;z-index:70}
  @keyframes fly{0%{opacity:1;transform:translate(0,0) scale(.6)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.1)}}

  #body{flex:1;overflow-y:auto;padding:6px 20px 130px;-webkit-overflow-scrolling:touch}
  #body::-webkit-scrollbar{display:none}
  h1.q{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:27px;line-height:1.12;margin:6px 0 4px;letter-spacing:-.01em;color:var(--brand)}
  .sub{color:var(--ink-soft);font-size:14px;line-height:1.45;margin:0 0 16px}
  .note{font-size:12.5px;color:var(--ink-soft);line-height:1.5;background:var(--accent-soft);border-radius:14px;padding:11px 13px;margin:8px 0 0}
  .warn{font-size:12px;color:var(--brand);line-height:1.5;background:#F7ECEF;border:1px solid #E7CBD5;border-radius:14px;padding:12px 13px;margin:14px 0 0}
  .warn b{font-weight:600}
  .policybox{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);padding:4px 15px;margin-bottom:14px}
  .policysec{padding:13px 0;border-bottom:1px solid var(--line)}
  .policysec:last-child{border-bottom:none}
  .policysec h4{font-family:'Playfair Display',Georgia,serif;font-size:14px;font-weight:600;margin:0 0 5px;color:var(--accent)}
  .policysec p{margin:0;font-size:12.8px;line-height:1.5;color:var(--ink-soft)}

  /* price band (from reference image) */
  .band{background:#F2E2E8;border-radius:14px;padding:9px 12px;display:flex;justify-content:space-between;
    font-family:'Playfair Display',Georgia,serif;font-weight:500;font-size:13.5px;color:var(--ink);margin-bottom:16px;gap:4px}
  .band span{white-space:nowrap}

  /* Option cards */
  .opts{display:flex;flex-direction:column;gap:11px}
  .opts.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .opt{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 15px;
    display:flex;align-items:center;gap:13px;cursor:pointer;transition:border-color .16s,background .16s,transform .12s;box-shadow:var(--shadow-sm);position:relative;text-align:left;width:100%;font-family:inherit;color:inherit}
  .opt:active{transform:scale(.985)}
  .opt.sel{border-color:var(--accent);background:linear-gradient(0deg,var(--accent-soft),#fff)}
  .opt .ic{flex:0 0 auto;width:48px;height:48px;border-radius:13px;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .opt .tx{flex:1;min-width:0}
  .opt .tt{display:block;font-weight:600;font-size:15.5px;line-height:1.25}
  .opt .ds{display:block;font-size:12.5px;color:var(--ink-soft);line-height:1.4;margin-top:2px}
  .opt .chk{position:absolute;top:11px;right:11px;width:21px;height:21px;border-radius:50%;border:2px solid var(--line);display:none;align-items:center;justify-content:center;background:#fff}
  .opt.multi .chk{display:flex}
  .opt.multi.sel .chk{background:var(--accent);border-color:var(--accent)}
  .opt.multi .chk svg{opacity:0}.opt.multi.sel .chk svg{opacity:1}
  .opt.optin-wide .tx{padding-right:28px}
  .opt.grid-card{flex-direction:column;align-items:center;gap:9px;padding:16px 12px;text-align:center}
  .opt.grid-card .ic{width:64px;height:64px}

  /* price tag (base) vs add tag */
  .ptag{flex:0 0 auto;font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:15px;color:var(--ink);
    background:#F2E2E8;border-radius:9px;padding:4px 10px}
  .atag{flex:0 0 auto;font-weight:600;font-size:13.5px;color:var(--accent);font-variant-numeric:tabular-nums}
  .opt.multi .atag{margin-right:26px}
  .opt .qtag{flex:0 0 auto;font-weight:600;font-size:12.5px;color:var(--ink-soft);background:#F2E2E8;border-radius:8px;padding:3px 9px}
  .opt.multi .qtag{margin-right:26px}

  /* tiers */
  .tier{font-family:'Playfair Display',Georgia,serif;font-size:21px;font-weight:600;color:var(--brand);margin:24px 0 11px;display:flex;align-items:center;gap:10px}
  .tier:first-of-type{margin-top:6px}
  .tier .ln{flex:1;height:1px;background:var(--line)}
  .divlabel{font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin:22px 0 10px;display:flex;align-items:center;gap:10px}
  .divlabel .ln{flex:1;height:1px;background:var(--line)}

  /* swatches named */
  .sw-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
  .sw-grid.is-disabled{opacity:.4;pointer-events:none;filter:grayscale(.35)}
  .disabled-note{background:var(--accent-soft);color:var(--brand);border-radius:14px;padding:14px;text-align:center;font-weight:600;font-size:13.5px;margin-bottom:16px}
  .sw{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
  .sw .chip{width:100%;aspect-ratio:5/4;border-radius:10px;border:2px solid rgba(0,0,0,.07);position:relative;transition:transform .12s}
  .sw:active .chip{transform:scale(.92)}
  .sw.sel .chip{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
  .sw.sel .chip::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;text-shadow:0 1px 3px rgba(0,0,0,.4)}
  .sw.light.sel .chip::after{color:var(--ink);text-shadow:none}
  .sw .nm{font-size:9.5px;color:var(--ink-soft);text-align:center;line-height:1.1}
  .sw.sel .nm{color:var(--ink);font-weight:600}
  .pigment-card{border:1.5px solid #E7CBD5;border-radius:18px;padding:13px 13px 4px;margin-top:22px;background:var(--card);box-shadow:0 0 16px rgba(115,8,44,.12)}
  .pig-head{font-size:12.5px;font-weight:600;color:var(--accent);margin-bottom:6px}
  .pig-desc{font-size:11.5px;color:var(--ink-soft);line-height:1.45;margin:0 0 11px}
  .pickcount{font-size:12.5px;color:var(--ink-soft);margin:12px 0 0;text-align:center}

  /* fields */
  .field{margin-bottom:15px}
  .field label{display:block;font-weight:600;font-size:13.5px;margin-bottom:6px}
  .field .opt-note{font-weight:400;color:var(--ink-soft);font-size:12px}
  input[type=text],input[type=tel],input[type=email],input[type=date],textarea,select{
    width:100%;border:1.5px solid var(--line);border-radius:14px;background:var(--card);
    padding:13px 14px;font-size:16px;font-family:inherit;color:var(--ink);box-shadow:var(--shadow-sm);outline:none;transition:border-color .15s}
  input:focus,textarea:focus,select:focus{border-color:var(--accent)}
  textarea{resize:none;min-height:88px;line-height:1.45}
  .row2{display:flex;gap:10px}
  .code-wrap{flex:0 0 118px;position:relative}
  select.code{padding-right:26px;appearance:none;-webkit-appearance:none;font-weight:600}
  .code-wrap::after{content:"▾";position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--ink-soft);pointer-events:none;font-size:12px}
  .code-wrap.custom::after{display:none}
  .linklike{background:none;border:none;color:var(--accent);font-family:inherit;font-weight:600;font-size:12.5px;cursor:pointer;padding:8px 2px 0;display:inline-block}
  .ig-wrap{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:14px;background:var(--card);box-shadow:var(--shadow-sm);overflow:hidden}
  .ig-wrap:focus-within{border-color:var(--accent)}
  .ig-wrap .at{padding:0 4px 0 14px;color:var(--ink-soft);font-size:16px}
  .ig-wrap input{border:none;box-shadow:none;padding-left:2px}
  .time-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:2px}
  .fdp-selected{background:var(--accent-soft);color:var(--accent);font-weight:600;border-radius:12px;padding:12px 14px;text-align:center;margin-bottom:14px;font-size:15px}
  .fdp-selected.empty{background:var(--card);border:1px dashed var(--line);color:var(--ink-faint);font-weight:500}
  .fdp{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);padding:12px}
  .fdp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .fdp-mo{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:16px}
  .fdp-nav{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--bg);font-size:15px;cursor:pointer;color:var(--ink)}
  .fdp-nav:disabled{opacity:.3;cursor:default}
  .fdp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .fdp-dow{text-align:center;font-size:10.5px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;padding:2px 0}
  .fdp-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;color:var(--ink)}
  .fdp-cell.past{color:var(--ink-faint);opacity:.35;cursor:default}
  .fdp-cell.off{color:var(--ink-faint);opacity:.3;cursor:default;text-decoration:line-through}
  .fdp-cell.empty{cursor:default}
  .fdp-cell.sel{background:var(--accent);color:#fff}
  .tslot{border:1.5px solid var(--line);background:var(--card);border-radius:9px;padding:8px 0;text-align:center;font-size:12.5px;font-weight:600;cursor:pointer;font-variant-numeric:tabular-nums}
  .tslot.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}

  .drop{border:2px dashed #DFCBD0;border-radius:var(--radius);background:var(--card);padding:26px 18px;text-align:center;cursor:pointer}
  .drop:active{transform:scale(.99)}
  .drop.has{border-style:solid;border-color:var(--pistachio);background:linear-gradient(0deg,#F2E2E8,#fff)}
  .drop .big{font-size:30px}
  .drop .t1{font-weight:600;font-size:15px;margin-top:8px}
  .drop .t2{font-size:12.5px;color:var(--ink-soft);margin-top:4px;line-height:1.4}
  .photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .photo-thumb{position:relative;aspect-ratio:1;border-radius:16px;overflow:hidden;border:1.5px solid var(--pistachio);box-shadow:var(--shadow-sm)}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .photo-rm{position:absolute;top:5px;right:5px;width:24px;height:24px;border-radius:50%;border:none;background:rgba(20,20,20,.6);color:#fff;font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
  .photo-add{aspect-ratio:1;border:2px dashed #DFCBD0;border-radius:16px;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;font-family:inherit;color:var(--ink-soft);padding:6px}
  .photo-add:active{transform:scale(.97)}
  .photo-add .big{font-size:26px;line-height:1;color:var(--accent)}
  .photo-add .t1{font-size:12px;font-weight:600;color:var(--ink)}
  .photo-add .t2{font-size:10.5px;color:var(--ink-soft)}
  .mini-upload{border:1.5px dashed #DFCBD0;border-radius:13px;background:var(--card);padding:11px;text-align:center;cursor:pointer;font-size:13px;color:var(--ink-soft);font-weight:600;margin-top:12px}
  .mini-upload.has{border-style:solid;border-color:var(--pistachio);color:var(--pistachio)}

  /* review */
  .rev{display:flex;flex-direction:column;gap:10px}
  .rblock{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);padding:13px 15px}
  .rblock .k{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:4px}
  .rblock .v{font-size:15px;font-weight:600;line-height:1.35}
  .rblock .v.norm{font-weight:500;font-size:14px}
  .rcolors{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .rcolors span{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:500}
  .rcolors i{width:14px;height:14px;border-radius:4px;border:1px solid rgba(0,0,0,.12);display:inline-block}
  .rtotal{background:var(--brand);color:#fff;border:none}
  .rtotal .k{color:rgba(255,255,255,.6)}
  .rtotal .v{font-family:'Playfair Display',Georgia,serif;font-size:22px}

  #lang{position:absolute;inset:0;background:linear-gradient(160deg,#F7F6F3,#F2E2E8);z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center}
  #lang .logo{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:15px;color:var(--accent);margin-bottom:auto;margin-top:24px}
  #lang .logoimg{width:300px;max-width:84%;height:auto;margin:0 auto 26px;display:block}
  #lang h1#langTitle,#lang h1{transition:opacity .5s ease}
  #lang .cake{font-size:58px;margin-bottom:16px;filter:drop-shadow(0 10px 18px rgba(115,8,44,.2))}
  #lang h1{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:31px;line-height:1.1;margin:0 0 8px;letter-spacing:-.02em;color:var(--brand)}
  #lang p{color:var(--ink-soft);font-size:14.5px;margin:0 0 28px;line-height:1.5;max-width:260px}
  #lang .langbtns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px;margin:16px auto 0}
  .langbtn{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:15px;font-family:inherit;font-size:16px;font-weight:600;color:var(--ink);cursor:pointer;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;gap:11px;transition:transform .15s,border-color .15s}
  .langbtn:active{transform:scale(.97);border-color:var(--accent)}
  .langbtn .badge{font-size:12px;font-weight:700;letter-spacing:.06em;background:var(--brand);color:#fff;border-radius:7px;padding:3px 7px}

  #foot{position:absolute;left:0;right:0;bottom:0;padding:14px 20px calc(22px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg,var(--bg) 62%,transparent);z-index:30}
  #next{width:100%;border:none;border-radius:16px;background:var(--accent);color:#fff;font-family:inherit;
    font-weight:600;font-size:16.5px;padding:16px;cursor:pointer;box-shadow:0 8px 22px rgba(115,8,44,.28);transition:transform .15s,opacity .15s}
  #next:active{transform:scale(.98)}
  #next:disabled{opacity:.4;box-shadow:none}
  #next.pist{background:var(--pistachio);box-shadow:0 8px 22px rgba(143,166,124,.32)}

  .modal{position:absolute;inset:0;z-index:60;background:rgba(20,20,20,.45);display:none;align-items:flex-end;justify-content:center;padding:0}
  .modal.show{display:flex}
  .modal-card{background:var(--bg);width:100%;max-height:88%;border-radius:24px 24px 0 0;display:flex;flex-direction:column;box-shadow:0 -10px 40px rgba(20,20,20,.28);animation:sheetUp .3s cubic-bezier(.4,0,.2,1)}
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px;flex:0 0 auto}
  .modal-title{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:20px;color:var(--brand)}
  .modal-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--card);font-size:19px;color:var(--ink);cursor:pointer;line-height:1;flex:0 0 auto}
  .modal-body{overflow-y:auto;padding:4px 20px 26px;-webkit-overflow-scrolling:touch}
  .modal-body::-webkit-scrollbar{display:none}
  /* add-on rows */
  .addon-row{cursor:pointer}
  .dz-thumb{flex:0 0 auto;width:52px;height:52px;border-radius:12px;overflow:hidden;padding:0;border:1.5px solid var(--line);background:var(--accent-soft);position:relative;cursor:zoom-in;display:flex;align-items:center;justify-content:center}
  .dz-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .dz-thumb.dz-ph{cursor:default}
  .dz-zoom{position:absolute;bottom:2px;right:2px;width:16px;height:16px;border-radius:5px;background:rgba(20,20,20,.55);color:#fff;font-size:10px;line-height:16px;text-align:center}
  .dz-thumb:active{transform:scale(.94)}
  /* centered image modal */
  .modal.center{align-items:center;padding:22px}
  .modal.center .modal-card{width:auto;max-width:340px;max-height:86%;border-radius:22px;position:relative;animation:popIn .26s cubic-bezier(.34,1.4,.5,1)}
  @keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .im-close{position:absolute;top:10px;right:10px;z-index:2;background:rgba(255,255,255,.9)}
  .im-body{padding:0;overflow:hidden;border-radius:22px}
  .im-photo{width:100%;display:block;aspect-ratio:4/5;object-fit:cover}
  .im-meta{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:14px 18px 18px}
  .im-name{font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:600;color:var(--brand)}
  .im-price{font-weight:600;font-size:15px;color:var(--brand);white-space:nowrap;font-variant-numeric:tabular-nums}
  .modal-body h4{font-family:'Playfair Display',Georgia,serif;font-size:14.5px;font-weight:600;color:var(--accent);margin:16px 0 4px}
  .modal-body p{font-size:13px;line-height:1.55;color:var(--ink-soft);margin:0 0 6px}
  .modal-body .muted{font-size:11.5px;color:var(--ink-faint)}
  #done{position:absolute;inset:0;background:linear-gradient(160deg,#F7F6F3,#F2E2E8);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px;text-align:center}
  #done.show{display:flex}
  #done .big{font-size:62px;margin-bottom:16px;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}

}
function shapeIcon(id){

    round:`<circle cx="24" cy="24" r="18" fill="${c}"/>`,

  writeMethods:[],writing:"",writingColor:"#1A1A1A",writingRef:false,

  noAllergy:false,allergies:"",notes:"",name:"",wcode:"+351",wcodeCustom:false,wnum:"",instagram:"",
  pdate:"",ptime:"",heard:null,referredBy:"",email:"",emailOptIn:false,agreed:false});

const STEPS=['size','shape','flavor','color','writing','wcolor','decor','cupcakes','candles','photo','allergies','notes','policies','contact','pickup','heard','email','review'];
const isBento=()=>S.size==='XS';
const sizeOpt=()=>D.size.opts.find(o=>o.id===S.size);
const isCustomQuote=()=>{const o=sizeOpt();return !!o&&o.price==null;};
const allFlav=()=>isBento()?D.flavBento:D.flavCustom.flatMap(g=>g.items);
const bigSize=()=>(S.size==='L'||S.size==='XL');
/* size-dependent surcharges */
function shapePrice(id){
  if(id==='round')return 0;
  if(id==='heart'||id==='square')return bigSize()?8:5;
  if(id==='rect')return bigSize()?10:8;
  return 0;
}
function sigPrice(){ if(S.size==='XL')return 10; if(S.size==='L')return 8; return 6; }
function flavPrice(o){ return o&&o.sig?sigPrice():(o&&o.price?o.price:0); }
function writeMethodPrice(id){
  if(id==='fondant')return bigSize()?6:5;
  if(id==='cutout')return bigSize()?10:8;
  return 0;
}
function decorPrice(o){ if(!o||o.quote)return null; return bigSize()?o.lxl:o.sm; }

/* ---------- Price ---------- */
function calc(){
  if(isCustomQuote())return{custom:true};
  let sum=0,range=false;
  const sz=sizeOpt(); if(sz&&sz.price!=null)sum+=sz.price;
  const sh=(isBento()?D.shapeBento:D.shapeCustom).find(o=>o.id===S.shape); if(sh)sum+=shapePrice(sh.id);
  const fl=allFlav().find(o=>o.id===S.flavor); if(fl)sum+=flavPrice(fl);
  if(S.colors.length>2)sum+=(S.colors.length-2)*5;
  const cup=D.cupcakes.find(o=>o.id===S.cupcakes); if(cup)sum+=cup.price;
  if(S.pigment.length){const pp=bigSize()?7:5;sum+=S.pigment.length*pp;}
  S.writeMethods.filter(id=>id!=='none').forEach(id=>sum+=writeMethodPrice(id));
  const dc=S.decor.filter(d=>d!=='none');
  if(dc.length){range=true;dc.forEach(id=>{const p=decorPrice(D.decor.find(x=>x.id===id));if(p)sum+=p;});}
  return{sum,range};
}
const priceNow=()=>{const c=calc();return c.custom?0:c.sum;};
function renderCart(){
  const c=calc(),amt=document.getElementById('cartAmt'),pre=document.getElementById('cartPre');
  if(!S.size){amt.textContent='€0';pre.textContent='';return;}
  if(c.custom){amt.textContent=t('quote');pre.textContent='';return;}
  pre.textContent=c.range?'from ':t('est')+' ';
  amt.textContent='€'+c.sum;
}
function sparkleBump(el){
  const cart=document.getElementById('cart');
  cart.classList.remove('bump');void cart.offsetWidth;cart.classList.add('bump');
  const r=el?el.getBoundingClientRect():{right:300,top:90};
  const s=document.createElement('div');s.className='spark';s.textContent='✨';
  s.style.left=r.right+'px';s.style.top=r.top+'px';
  s.style.setProperty('--dx',(30+Math.random()*30)+'px');
  s.style.setProperty('--dy',(-28-Math.random()*18)+'px');
  document.getElementById('phone').appendChild(s);setTimeout(()=>s.remove(),700);
}
/* Wrap a state change: animate cart only if the total actually increased */
function change(el,fn){const before=priceNow();fn();const after=priceNow();renderCart();if(after>before)sparkleBump(el);}

const B=()=>document.getElementById('body');
function render(){
  const key=STEPS[step];B().scrollTop=0;
  document.getElementById('back').hidden=(step===0);
  document.getElementById('stepno').textContent=t('step')+' '+(step+1)+'/'+STEPS.length;
  document.getElementById('restartTxt').textContent=t('restart');
  document.querySelector('#progress > i').style.width=(step/(STEPS.length-1)*100)+'%';
  const next=document.getElementById('next');
  next.classList.toggle('pist',key==='review');
  next.textContent=key==='review'?t('send'):t('continue');
  renderCart();R[key]();validate();
  try{if(window.parent&&window.parent!==window)window.parent.postMessage({t:'byas-step',s:step+1,n:STEPS.length},'*');}catch(e){}
}

  const WDs=lang==='en'?['Su','Mo','Tu','We','Th','Fr','Sa']:['Do','Se','Te','Qa','Qi','Sx','Sá'];

function bindSingle(field,after){

/* ---------- validation ---------- */
function validate(){
  const k=STEPS[step];let ok=true;
  if(k==='size')ok=!!S.size;
  else if(k==='shape')ok=!!S.shape;
  else if(k==='flavor')ok=!!S.flavor;
  else if(k==='color')ok=S.colors.length>=1;
  else if(k==='writing')ok=S.writeMethods.length>=1;
  else if(k==='photo')ok=S.photo;
  else if(k==='allergies')ok=S.noAllergy||S.allergies.trim().length>0;
  else if(k==='contact')ok=S.name.trim()&&S.wnum.trim().length>3;
  else if(k==='pickup')ok=S.pdate&&S.ptime;
  else if(k==='heard')ok=!!S.heard;
  else if(k==='policies')ok=S.agreed;
  document.getElementById('next').disabled=!ok;
}

/* map form state to database row (English labels for the owner dashboard) */
function buildPayload(photo_urls){
  photo_urls=photo_urls||[];
  const primaryPhoto=photo_urls[0]||null;
  let photoNote=S.photoNote||"";
  if(photo_urls.length>1){
    const extra=photo_urls.slice(1).join("  |  ");
    photoNote=(photoNote?photoNote+"\n\n":"")+"Additional reference photos: "+extra;
  }
  const so=D.size.opts.find(o=>o.id===S.size);
  const portions=so?so.d.en.replace(' portions','').replace(' porções',''):'';
  const sizeStr=so?`${so.id}${portions?` (${portions})`:''}`:S.size;
  const sh=(isBento()?D.shapeBento:D.shapeCustom).find(o=>o.id===S.shape);
  const fl=allFlav().find(o=>o.id===S.flavor);
  const colorsArr=S.colors.map(h=>{const o=D.colors.find(x=>x.h===h);return [o?o.t.en:h,h];});
  const pigArr=S.pigment.map(id=>{const o=D.pigment.find(x=>x.id===id);return o?o.t.en:id;});
  const dsel=S.decor.filter(d=>d!=='none');
  const decorArr=dsel.length?dsel.map(id=>{const o=D.decor.find(x=>x.id===id);return o?o.t.en:id;}):["No decoration"];
  const cup=D.cupcakes.find(o=>o.id===S.cupcakes);
  const wm=S.writeMethods.filter(id=>id!=='none').map(id=>{const o=D.writeMethods.find(x=>x.id===id);return o?o.t.en:id;});
  const wc=S.writingRef?"Reference photo":((D.colors.find(x=>x.h===S.writingColor)||{}).t?.en||S.writingColor);
  const hrd=(D.heard.find(o=>o.id===S.heard)||{}).t?.en||S.heard;
  const c=calc();
  return {
    status:"new", is_read:false, paid:0,
    language:lang.toUpperCase(),
    cake_type:isBento()?"Bento":"Custom",
    size:sizeStr, shape:sh?sh.t.en:S.shape, flavor:fl?fl.t.en:S.flavor,
    colors:colorsArr, pigment:pigArr, write_methods:wm,
    writing:S.writing, writing_color:wc,
    cupcakes:cup?cup.t.en:S.cupcakes, decor:decorArr, candles:S.candles==='yes'?"Yes":"No",
    photo_url:primaryPhoto, photo_note:photoNote,
    no_allergy:S.noAllergy, allergies:S.noAllergy?"":S.allergies, notes:S.notes,
    name:S.name, whatsapp:(S.wcode+" "+S.wnum).trim(), instagram:S.instagram,
    pickup_date:S.pdate||null, pickup_time:S.ptime,
    heard:hrd, referred_by:S.referredBy, email:S.email, email_opt_in:S.emailOptIn,
    price:c.custom?null:c.sum, price_range:c.custom?false:!!c.range, agreed:S.agreed
  };
}

async function submit(){
  const btn=document.getElementById('next');
  btn.disabled=true; btn.textContent=lang==='en'?'Sending…':'A enviar…';
  try{
    if(!sb) throw new Error("Connection not ready. Please refresh and try again.");
    let photo_urls=[];
    for(const f of S.photoFiles.slice(0,3)){
      const ext=(f.name.split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,'')||'jpg';
      const path=`orders/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
      const up=await sb.storage.from('references').upload(path,f,{cacheControl:'3600',upsert:false});
      if(up.error) throw up.error;
      photo_urls.push(sb.storage.from('references').getPublicUrl(path).data.publicUrl);
    }
    const {error}=await sb.from('orders').insert(buildPayload(photo_urls));
    if(error) throw error;
    showDone();
  }catch(e){
    btn.disabled=false; btn.textContent=t('send');
    alert((lang==='en'
      ?"Sorry — something went wrong sending your order. Please try again.\n\n"
      :"Ocorreu um erro ao enviar o pedido. Tente novamente.\n\n")+(e.message||e));
  }
}

function showDone(){
  const d=document.getElementById('done');const fn=(S.name.split(' ')[0]||'');

  document.getElementById('doneAgain').textContent=lang==='en'?'Start over':'Recomeçar';
  d.classList.add('show');
}

let pickMonth=null;
function pad(n){return String(n).padStart(2,'0');}
function pickDate(iso){S.pdate=iso;R.pickup();validate();}
function shiftMonth(n){pickMonth=new Date(pickMonth.getFullYear(),pickMonth.getMonth()+n,1);R.pickup();}
function fmtPicked(iso){const d=new Date(iso+'T00:00:00');
  const wd=(lang==='en'?['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']
    :['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'])[d.getDay()];
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} - ${wd}`;}
function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function isLight(hex){const c=hex.substring(1);const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);return(0.299*r+0.587*g+0.114*b)>175;}

/* animated bilingual landing title (starts Portuguese, 2.5s each) */
const _LT=[["Vamos fazer","o seu bolo"],["Let's make","your cake"]];
let _lti=1;
(function(){const el=document.getElementById('langTitle');if(!el)return;
  el.innerHTML=_LT[0][0]+'<br>'+_LT[0][1];
  setInterval(()=>{el.style.opacity='0';setTimeout(()=>{el.innerHTML=_LT[_lti][0]+'<br>'+_LT[_lti][1];el.style.opacity='1';_lti=(_lti+1)%2;},450);},2500);
})();

/* Opened from the website: read ?lang and ?embed, skip the language screen, and sync with the parent. */
(function(){try{
  var qp=new URLSearchParams(location.search);
  if(qp.get('embed')==='1')document.body.classList.add('embed');
  var q=qp.get('lang');
  if(q==='en'||q==='pt')start(q);
}catch(e){}})();
window.addEventListener('message',function(e){if(e.data&&e.data.t==='byas-restart'){S=DEF();step=0;render();}});
</script>
