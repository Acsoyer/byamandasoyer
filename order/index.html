    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:var(--bg);color:var(--ink);font-family:'DM Sans',system-ui,sans-serif}.wrap{width:min(680px,100%);margin:0 auto;padding:22px 16px 55px}.brand{text-align:center;margin:4px 0 24px}.brand-logo{width:min(300px,80vw);margin:0 auto}.brand span{display:block;font:500 10px 'DM Sans',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:3px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:20px;margin-bottom:12px}h1{font-size:13px;text-transform:uppercase;letter-spacing:.11em;color:var(--muted);margin:0 0 8px}.customer-name{font:600 28px 'Playfair Display',serif;color:var(--brand);margin:0 0 17px}h2{font:600 23px 'Playfair Display',serif;margin:0 0 4px}.sub{color:var(--muted);font-size:14px;line-height:1.5}.details{margin-top:16px;border-top:1px solid var(--line)}.row{display:flex;justify-content:space-between;gap:18px;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}.row span:first-child{color:var(--muted);flex:0 0 38%}.row b{text-align:right;overflow-wrap:anywhere}.receipt{margin-top:18px;border:1px solid #d9d9d4;border-radius:0;overflow:hidden;background:#fff;color:#171717;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono',monospace;box-shadow:none}.receipt-head{padding:10px 12px;border-bottom:1px dashed #bebeb8;background:#fff;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}.receipt-row{display:grid;grid-template-columns:minmax(0,auto) minmax(14px,1fr) auto;align-items:end;gap:7px;min-height:34px;padding:8px 11px;font-size:11px;line-height:1.35}.receipt-row:nth-child(odd){background:#fafaf9}.receipt-row:nth-child(even){background:#fff}.receipt-name{min-width:0;overflow-wrap:anywhere}.receipt-dots{height:1em;border-bottom:1px dotted #aaa;transform:translateY(-3px)}.receipt-price{font-weight:800;white-space:nowrap}.receipt-price.free{color:var(--ok)}.receipt-price.quote{color:#686864;font-size:10px}.receipt-total{border-top:1px dashed #aaa;font-size:12px;font-weight:800;background:#fff!important}.money-summary{display:flex;justify-content:center;background:#f0f2f0;border-radius:14px;padding:16px 18px}.money-pair{display:grid;grid-template-columns:auto auto auto;grid-template-rows:auto auto;align-items:baseline;justify-content:center;column-gap:9px;row-gap:1px}.deposit-amount{grid-column:1;grid-row:1;color:var(--ink);font-size:30px;font-weight:700;letter-spacing:-.04em}.money-slash{grid-column:2;grid-row:1;color:#9aa19e;font-size:22px;font-weight:500}.total-amount{grid-column:3;grid-row:1;color:var(--ink);font-size:21px;font-weight:650;letter-spacing:-.025em}.deposit-label,.total-label{color:var(--muted);font-size:11px;line-height:1.2;text-align:center}.deposit-label{grid-column:1;grid-row:2}.total-label{grid-column:3;grid-row:2}.instruction{font-size:14px;line-height:1.6;margin:17px 1px 2px}.pay-method{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-top:9px}.pay-method small{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:4px}.pay-method code{font:600 14px 'DM Sans',sans-serif;word-break:break-all}.copy{border:1px solid var(--line);background:#f0f2f0;border-radius:9px;padding:8px 10px;font:600 12px 'DM Sans',sans-serif;cursor:pointer}.actions{display:grid;gap:9px;margin-top:16px}.btn{border:0;border-radius:12px;padding:13px 15px;font:700 14px 'DM Sans',sans-serif;cursor:pointer}.primary{background:var(--brand);color:#fff}.secondary{background:transparent;border:1px solid var(--line);color:var(--muted)}.notice{background:#eef4f1;border:1px solid #cbddd4;color:#285744;border-radius:13px;padding:13px;font-size:13px;line-height:1.5;margin-top:12px}.courier{background:#edf3f6;border-color:#cbdde5;color:#2d5263}.expiry{text-align:center;color:var(--muted);font-size:12px;margin-top:15px}.state{text-align:center;padding:48px 20px;color:var(--muted)}.state h2{color:var(--ink);margin-bottom:8px}.hidden{display:none}.spinner{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 13px}@keyframes spin{to{transform:rotate(360deg)}}

<body>
  <main class="wrap"><div class="brand"><img class="brand-logo" src="https://ivnybivjjydihltknlmo.supabase.co/storage/v1/object/public/references/images/byAmandaSoyer_Logo_NoBackground.png" alt="by Amanda Soyer"><span>Cake Studio · Lisbon</span></div><div id="app"><div class="card state"><div class="spinner"></div><div>Loading your quote…</div></div></div></main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SB_URL='https://ivnybivjjydihltknlmo.supabase.co';
    const SB_KEY='sb_publishable_JgB-ewQdFNoFS25-tOxp4g_G-I0s1E2';
    const sb=window.supabase.createClient(SB_URL,SB_KEY);
    const app=document.getElementById('app');
    const token=(()=>{const q=new URLSearchParams(location.search).get('token');if(q)return q;const p=location.pathname.split('/').filter(Boolean);const last=p[p.length-1]||'';return ['order','index.html'].includes(last)?'':last;})();
    let order=null,lang='en';
    const T={
      en:{summary:'Order Summary',cakeSize:'Cake Size',portionSize:'Portion Size',flavour:'Cake Flavour',colors:'Colors',candle:'Candle',addons:'Add-ons',allergies:'Allergies',writing:'Writing',pickup:'Pick-up',total:'Total',deposit:'Reservation Deposit (50%)',intro:'To confirm your booking, please pay the 50% non-refundable deposit using one of the payment methods below.',mbway:'MB Way',iban:'IBAN',copy:'Copy',copied:'Copied ✓',after:'Once you’ve made the deposit, please send your proof of payment via WhatsApp. I’ll then confirm your booking and send your order confirmation.',accept:'I accept — I’ll pay the deposit',cancel:'Cancel this order',expires:'This quote expires',courier:'You selected the courier option. This remains a collection order: you are responsible for booking and tracking your Uber/Bolt courier for the agreed date and time.',acceptedTitle:'Thank you',accepted:'Your acceptance has been recorded. Please make the deposit and send your proof of payment via WhatsApp.',cancelledTitle:'Order cancelled',cancelled:'Your cancellation has been recorded.',invalidTitle:'This quote is unavailable',invalid:'The link may have expired or been replaced. Please contact Amanda for a new quote link.',error:'Something went wrong. Please try again.'},
      pt:{summary:'Resumo da Encomenda',cakeSize:'Tamanho do Bolo',portionSize:'Número de Porções',flavour:'Sabor do Bolo',colors:'Cores',candle:'Vela',addons:'Extras',allergies:'Alergias',writing:'Mensagem',pickup:'Levantamento',total:'Total',deposit:'Sinal de Reserva (50%)',intro:'Para confirmar a sua reserva, pague o sinal não reembolsável de 50% através de um dos métodos abaixo.',mbway:'MB Way',iban:'IBAN',copy:'Copiar',copied:'Copiado ✓',after:'Depois de efetuar o pagamento do sinal, envie o comprovativo por WhatsApp. Em seguida, confirmarei a sua reserva e enviarei a confirmação da encomenda.',accept:'Aceito — vou pagar o sinal',cancel:'Cancelar esta encomenda',expires:'Este orçamento expira',courier:'Selecionou a opção de estafeta. Esta continua a ser uma encomenda para levantamento: deverá reservar e acompanhar o seu estafeta Uber/Bolt para a data e hora combinadas.',acceptedTitle:'Obrigada',accepted:'A sua aceitação foi registada. Efetue o pagamento do sinal e envie o comprovativo por WhatsApp.',cancelledTitle:'Encomenda cancelada',cancelled:'O cancelamento da sua encomenda foi registado.',invalidTitle:'Este orçamento não está disponível',invalid:'A ligação pode ter expirado ou sido substituída. Contacte a Amanda para receber uma nova ligação.',error:'Ocorreu um erro. Tente novamente.'}
    };
    const tr=k=>T[lang][k];const esc=v=>String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const money=v=>new Intl.NumberFormat(lang==='pt'?'pt-PT':'en-IE',{style:'currency',currency:'EUR'}).format(Number(v||0));
    function dateText(iso,time){const d=new Date(iso+'T00:00:00');const date=new Intl.DateTimeFormat(lang==='pt'?'pt-PT':'en-GB',{day:'numeric',month:'long',year:'numeric',weekday:'long'}).format(d);let tm=time||'';if(lang==='en'&&/^\d\d:\d\d$/.test(tm)){const [h,m]=tm.split(':').map(Number);tm=`${h%12||12}:${String(m).padStart(2,'0')}${h>=12?'PM':'AM'}`;}return `${date} · ${tm}`;}
    function listText(value){if(!Array.isArray(value))return value||'';return value.map(v=>Array.isArray(v)?v[0]:v).filter(Boolean).join(', ');}
    function detailRow(label,value){return value?`<div class="row"><span>${esc(label)}</span><b>${esc(value)}</b></div>`:'';}
    function receiptHTML(x){
      const pt=lang==='pt';
      const labels={head:pt?'Detalhes do preço':'Price details',base:pt?'Bolo base':'Base cake',custom:pt?'Orçamento personalizado':'Custom cake quote',extra:pt?'Cor extra do bolo':'Extra cake colour',pigment:pt?'Cor de pigmento intenso':'High-pigment colour',candles:pt?'Velas':'Candles',rush:pt?'Pedido urgente':'Rush order',adjust:pt?'Itens orçamentados':'Quoted Items',included:pt?'Incluído no orçamento':'Included in quote',free:pt?'Grátis':'Free',total:pt?'Total final':'Final total'};
      const size=String(x.cake_size||x.size||'').trim();
      const big=size==='L'||size==='XL';
      const finalPrice=Number(x.price||0);
      const rows=[];
      let known=0;
      const add=(name,amount,kind='')=>{rows.push({name,amount,kind});if(typeof amount==='number')known+=amount;};
      const basePrices={'XS Bento':30,'S':40,'M':55,'L':80,'XL':110};
      const shapePrices={Heart:big?8:5,Square:big?8:5,Rectangle:big?10:8};
      const signature=new Set(['Berry Cheesecake','Pistachio Strawberry','Salted Caramel Peanut','Biscoff','Coconut Passion']);
      const writingPrices={'Fondant Letters':big?6:5,'Cutout Letters':big?10:8};
      const decorPrices={Bows:big?5:3,'Edible prints':big?15:10,'Paper butterflies':big?8:5,'Maraschino cherries':big?8:6,'Maraschino cherries + glitter':big?10:8};
      const quotedDecor=new Set(['Custom themed images','Decorative balls','Disco balls','Fresh edible flowers','Fresh fruits','Gold or silver star, sun, moon','Custom']);
      const base=basePrices[size];
      if(shapePrices[x.shape])add(x.shape,shapePrices[x.shape]);
      if(signature.has(x.flavor))add(x.flavor,big?(size==='XL'?10:8):6);
      const extraColours=Math.max(0,(Array.isArray(x.colors)?x.colors.length:0)-2);
      if(extraColours)add(`${labels.extra} ×${extraColours}`,extraColours*5);
      const pigmentCount=Array.isArray(x.pigment)?x.pigment.length:0;
      if(pigmentCount)add(`${labels.pigment} ×${pigmentCount}`,pigmentCount*(big?7:5));
      (Array.isArray(x.write_methods)?x.write_methods:[]).forEach(name=>{if(writingPrices[name])add(name,writingPrices[name]);});
      if(/^6 Cupcakes$/i.test(x.cupcakes||''))add(x.cupcakes,15);
      if(/^12 Cupcakes$/i.test(x.cupcakes||''))add(x.cupcakes,30);
      (Array.isArray(x.addons)?x.addons:[]).forEach(name=>{if(decorPrices[name])add(name,decorPrices[name]);else if(quotedDecor.has(name))add(name,labels.included,'quote');});
      if(/^yes$/i.test(x.candles||''))add(labels.candles,labels.free,'free');
      const rush=Number(x.rush_surcharge||0);if(rush)add(labels.rush,rush);
      const surchargeTotal=known;
      if(base!=null){rows.unshift({name:`${labels.base} · ${size}`,amount:base,kind:'base'});known+=base;const adjustment=Math.round((finalPrice-known)*100)/100;if(Math.abs(adjustment)>=.01)add(labels.adjust,adjustment);}
      else{const quotedBase=Math.max(0,Math.round((finalPrice-surchargeTotal)*100)/100);rows.unshift({name:`${labels.custom} · ${size}`,amount:quotedBase,kind:'base'});known+=quotedBase;const adjustment=Math.round((finalPrice-known)*100)/100;if(Math.abs(adjustment)>=.01)add(labels.adjust,adjustment);}
      const amountText=r=>typeof r.amount==='number'?(r.kind==='base'?money(r.amount):`${r.amount<0?'−':'+'}${money(Math.abs(r.amount))}`):r.amount;
      return `<div class="receipt"><div class="receipt-head">${labels.head}</div>${rows.map(r=>`<div class="receipt-row"><span class="receipt-name">${esc(r.name)}</span><span class="receipt-dots"></span><span class="receipt-price ${r.kind||''}">${esc(amountText(r))}</span></div>`).join('')}<div class="receipt-row receipt-total"><span class="receipt-name">${labels.total}</span><span class="receipt-dots"></span><span class="receipt-price">${esc(money(finalPrice))}</span></div></div>`;
    }
    function render(){const x=order;const accepted=x.customer_decision==='accepted';const addons=[listText(x.addons),x.cupcakes&&!/^no cupcakes$/i.test(x.cupcakes)?x.cupcakes:''].filter(Boolean).join(', ');const allergyText=x.allergies==='None declared'?(lang==='pt'?'Nenhuma declarada':'None declared'):x.allergies;document.documentElement.lang=lang;document.title=(lang==='pt'?'A sua encomenda':'Your order')+' · byAS';app.innerHTML=`
      <section class="card"><h1>${tr('summary')}</h1><p class="customer-name">${esc(x.name)}</p><h2>${esc([x.cake_type,x.shape].filter(Boolean).join(' · '))}</h2><div class="details">${detailRow(tr('cakeSize'),x.cake_size||x.size)}${detailRow(tr('portionSize'),x.portion_size)}${detailRow(tr('flavour'),x.flavor)}${detailRow(tr('colors'),listText(x.colors))}${detailRow(tr('candle'),x.candles)}${detailRow(tr('addons'),addons)}${detailRow(tr('allergies'),allergyText)}${x.writing?`<div class="row"><span>${tr('writing')}</span><b>“${esc(x.writing)}”</b></div>`:''}<div class="row"><span>${tr('pickup')}</span><b>${esc(dateText(x.pickup_date,x.pickup_time))}</b></div></div>${receiptHTML(x)}${x.courier?`<div class="notice courier">${tr('courier')}</div>`:''}</section>
      <section class="card"><div class="money-summary"><div class="money-pair"><b class="deposit-amount">${money(x.deposit)}</b><span class="money-slash">/</span><b class="total-amount">${money(x.price)}</b><span class="deposit-label">${lang==='pt'?'sinal':'deposit'}</span><span class="total-label">total</span></div></div><p class="instruction">${tr('intro')}</p>${payMethod(tr('mbway'),[x.mbway,x.mbway_name].filter(Boolean).join(' · '),'mbway',mbwayNumber(x.mbway))}${payMethod(tr('iban'),x.iban,'iban')}<div class="notice">${tr('after')}</div>${accepted?`<div class="notice"><b>${tr('acceptedTitle')}</b><br>${tr('accepted')}</div>`:`<div class="actions"><button class="btn primary" onclick="respond('accepted')">${tr('accept')}</button><button class="btn secondary" onclick="respond('cancelled')">${tr('cancel')}</button></div>`}<div class="expiry">${tr('expires')}: <span id="countdown"></span></div></section>`;tick();}
    function mbwayNumber(value){const digits=String(value||'').replace(/\D/g,'');return digits.length>9?digits.slice(-9):digits;}
    function payMethod(label,value,id,copyValueOverride){const valueToCopy=copyValueOverride==null?value:copyValueOverride;return `<div class="pay-method"><div><small>${esc(label)}</small><code>${esc(value||'—')}</code></div><button class="copy" id="${id}Btn" onclick="copyValue('${id}',decodeURIComponent('${encodeURIComponent(valueToCopy||'')}'))">${tr('copy')}</button></div>`;}
    function copyValue(id,value){const done=()=>{const b=document.getElementById(id+'Btn');if(b){b.textContent=tr('copied');setTimeout(()=>b.textContent=tr('copy'),1400);}};if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(value).then(done).catch(()=>fallback(value,done));else fallback(value,done);}
    function fallback(value,done){const t=document.createElement('textarea');t.value=value;t.style.position='fixed';t.style.opacity='0';document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();done();}
    function tick(){const el=document.getElementById('countdown');if(!el)return;const ms=new Date(order.expires_at)-new Date();if(ms<=0){location.reload();return;}const h=Math.floor(ms/3600000),m=Math.floor(ms%3600000/60000);el.textContent=`${h}h ${m}m`;setTimeout(tick,30000);}
    async function respond(decision){if(decision==='cancelled'&&!confirm(lang==='pt'?'Tem a certeza de que deseja cancelar esta encomenda?':'Are you sure you want to cancel this order?'))return;const {data,error}=await sb.rpc('respond_order_portal',{p_token:token,p_decision:decision});if(error){alert(tr('error'));return;}if(decision==='accepted'){order.customer_decision='accepted';render();}else app.innerHTML=`<section class="card state"><h2>${tr('cancelledTitle')}</h2><p>${tr('cancelled')}</p></section>`;}
    async function init(){if(!token){showInvalid();return;}const {data,error}=await sb.rpc('get_order_portal',{p_token:token});if(error||!data){showInvalid();return;}order=typeof data==='string'?JSON.parse(data):data;lang=String(order.language).toUpperCase()==='PT'?'pt':'en';if(order.customer_decision==='cancelled'){app.innerHTML=`<section class="card state"><h2>${tr('cancelledTitle')}</h2><p>${tr('cancelled')}</p></section>`;return;}render();}
    function showInvalid(){app.innerHTML=`<section class="card state"><h2>${tr('invalidTitle')}</h2><p>${tr('invalid')}</p></section>`;}
    init();
  </script>
