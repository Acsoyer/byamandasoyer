<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>Your order · by Amanda Soyer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f4f4f1;--card:#fff;--ink:#202624;--muted:#6e7773;--line:#dde1de;--brand:#6d2435;--brand-soft:#f4e8eb;--ok:#2f7257;--warn:#8d651b;--shadow:0 12px 40px rgba(26,34,30,.08)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:var(--bg);color:var(--ink);font-family:'DM Sans',system-ui,sans-serif}.wrap{width:min(680px,100%);margin:0 auto;padding:22px 16px 55px}.brand{text-align:center;margin:4px 0 24px}.brand-logo{width:min(300px,80vw);margin:0 auto}.brand span{display:block;font:500 10px 'DM Sans',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:3px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:20px;margin-bottom:12px}h1{font-size:13px;text-transform:uppercase;letter-spacing:.11em;color:var(--muted);margin:0 0 8px}.customer-name{font:600 28px 'Playfair Display',serif;color:var(--brand);margin:0 0 17px}h2{font:600 23px 'Playfair Display',serif;margin:0 0 4px}.sub{color:var(--muted);font-size:14px;line-height:1.5}.details{margin-top:16px;border-top:1px solid var(--line)}.row{display:flex;justify-content:space-between;gap:18px;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}.row span:first-child{color:var(--muted);flex:0 0 38%}.row b{text-align:right;overflow-wrap:anywhere}.money-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.money{background:#f0f2f0;border-radius:14px;padding:15px}.money span{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}.money b{font-size:25px;letter-spacing:-.03em}.instruction{font-size:14px;line-height:1.6;margin:17px 1px 2px}.pay-method{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-top:9px}.pay-method small{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:4px}.pay-method code{font:600 14px 'DM Sans',sans-serif;word-break:break-all}.copy{border:1px solid var(--line);background:#f0f2f0;border-radius:9px;padding:8px 10px;font:600 12px 'DM Sans',sans-serif;cursor:pointer}.actions{display:grid;gap:9px;margin-top:16px}.btn{border:0;border-radius:12px;padding:13px 15px;font:700 14px 'DM Sans',sans-serif;cursor:pointer}.primary{background:var(--brand);color:#fff}.secondary{background:transparent;border:1px solid var(--line);color:var(--muted)}.notice{background:#eef4f1;border:1px solid #cbddd4;color:#285744;border-radius:13px;padding:13px;font-size:13px;line-height:1.5;margin-top:12px}.courier{background:#edf3f6;border-color:#cbdde5;color:#2d5263}.expiry{text-align:center;color:var(--muted);font-size:12px;margin-top:15px}.state{text-align:center;padding:48px 20px;color:var(--muted)}.state h2{color:var(--ink);margin-bottom:8px}.hidden{display:none}.spinner{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 13px}@keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:480px){.wrap{padding:16px 12px 42px}.card{padding:17px;border-radius:16px}.money-grid{grid-template-columns:1fr}.row{align-items:flex-start}.pay-method{grid-template-columns:1fr}.copy{width:100%}}
  </style>
</head>
<body>
  <main class="wrap"><div class="brand"><img class="brand-logo" src="https://ivnybivjjydihltknlmo.supabase.co/storage/v1/object/public/references/images/byAmandaSoyer_Logo_NoBackground.png" alt="by Amanda Soyer"><span>Cake Studio · Lisbon</span></div><div id="app"><div class="card state"><div class="spinner"></div><div>Loading your quote…</div></div></div></main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SB_URL='https://ivnybivjjydihltknlmo.supabase.co';
    const SB_KEY='sb_publishable_JgB-ewQdFNoFS25-tOxp4g_G-I0s1E2';
    const sb=window.supabase.createClient(SB_URL,SB_KEY);
    const app=document.getElementById('app');
    const token=(()=>{const q=new URLSearchParams(location.search).get('token');if(q)return q;const p=location.pathname.split('/').filter(Boolean);const last=p[p.length-1]||'';return ['order','index.html'].includes(last)?'':last;})();
    let order=null,lang='en';
    const T={
      en:{summary:'Order Summary',cakeSize:'Cake Size',portionSize:'Portion Size',flavour:'Cake Flavour',colors:'Colors',candle:'Candle',addons:'Add-ons',allergies:'Allergies',writing:'Writing',pickup:'Pick-up',total:'Total',deposit:'Reservation Deposit (50%)',intro:'To confirm your booking, please pay the 50% non-refundable deposit using one of the payment methods below.',mbway:'MB Way',iban:'IBAN',copy:'Copy',copied:'Copied ✓',after:'Once you’ve made the deposit, please send your proof of payment via WhatsApp. I’ll then confirm your booking and send your order confirmation.',accept:'I accept — I’ll pay the deposit',cancel:'Cancel this order',expires:'This quote expires',courier:'You selected the courier option. This remains a collection order: you are responsible for booking and tracking your Uber/Bolt courier for the agreed date and time.',acceptedTitle:'Thank you',accepted:'Your acceptance has been recorded. Please make the deposit and send your proof of payment via WhatsApp.',cancelledTitle:'Order cancelled',cancelled:'Your cancellation has been recorded.',invalidTitle:'This quote is unavailable',invalid:'The link may have expired or been replaced. Please contact Amanda for a new quote link.',error:'Something went wrong. Please try again.'},
      pt:{summary:'Resumo da Encomenda',cakeSize:'Tamanho do Bolo',portionSize:'Número de Porções',flavour:'Sabor do Bolo',colors:'Cores',candle:'Vela',addons:'Extras',allergies:'Alergias',writing:'Mensagem',pickup:'Levantamento',total:'Total',deposit:'Sinal de Reserva (50%)',intro:'Para confirmar a sua reserva, pague o sinal não reembolsável de 50% através de um dos métodos abaixo.',mbway:'MB Way',iban:'IBAN',copy:'Copiar',copied:'Copiado ✓',after:'Depois de efetuar o pagamento do sinal, envie o comprovativo por WhatsApp. Em seguida, confirmarei a sua reserva e enviarei a confirmação da encomenda.',accept:'Aceito — vou pagar o sinal',cancel:'Cancelar esta encomenda',expires:'Este orçamento expira',courier:'Selecionou a opção de estafeta. Esta continua a ser uma encomenda para levantamento: deverá reservar e acompanhar o seu estafeta Uber/Bolt para a data e hora combinadas.',acceptedTitle:'Obrigada',accepted:'A sua aceitação foi registada. Efetue o pagamento do sinal e envie o comprovativo por WhatsApp.',cancelledTitle:'Encomenda cancelada',cancelled:'O cancelamento da sua encomenda foi registado.',invalidTitle:'Este orçamento não está disponível',invalid:'A ligação pode ter expirado ou sido substituída. Contacte a Amanda para receber uma nova ligação.',error:'Ocorreu um erro. Tente novamente.'}
    };
    const tr=k=>T[lang][k];const esc=v=>String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const money=v=>new Intl.NumberFormat(lang==='pt'?'pt-PT':'en-IE',{style:'currency',currency:'EUR'}).format(Number(v||0));
    function dateText(iso,time){const d=new Date(iso+'T00:00:00');const date=new Intl.DateTimeFormat(lang==='pt'?'pt-PT':'en-GB',{day:'numeric',month:'long',year:'numeric',weekday:'long'}).format(d);let tm=time||'';if(lang==='en'&&/^\d\d:\d\d$/.test(tm)){const [h,m]=tm.split(':').map(Number);tm=`${h%12||12}:${String(m).padStart(2,'0')}${h>=12?'PM':'AM'}`;}return `${date} · ${tm}`;}
    function listText(value){if(!Array.isArray(value))return value||'';return value.map(v=>Array.isArray(v)?v[0]:v).filter(Boolean).join(', ');}
    function detailRow(label,value){return value?`<div class="row"><span>${esc(label)}</span><b>${esc(value)}</b></div>`:'';}
    function render(){const x=order;const accepted=x.customer_decision==='accepted';const addons=[listText(x.addons),x.cupcakes&&!/^no cupcakes$/i.test(x.cupcakes)?x.cupcakes:''].filter(Boolean).join(', ');const allergyText=x.allergies==='None declared'?(lang==='pt'?'Nenhuma declarada':'None declared'):x.allergies;document.documentElement.lang=lang;document.title=(lang==='pt'?'A sua encomenda':'Your order')+' · by Amanda Soyer';app.innerHTML=`
      <section class="card"><h1>${tr('summary')}</h1><p class="customer-name">${esc(x.name)}</p><h2>${esc([x.cake_type,x.shape].filter(Boolean).join(' · '))}</h2><div class="details">${detailRow(tr('cakeSize'),x.cake_size||x.size)}${detailRow(tr('portionSize'),x.portion_size)}${detailRow(tr('flavour'),x.flavor)}${detailRow(tr('colors'),listText(x.colors))}${detailRow(tr('candle'),x.candles)}${detailRow(tr('addons'),addons)}${detailRow(tr('allergies'),allergyText)}${x.writing?`<div class="row"><span>${tr('writing')}</span><b>“${esc(x.writing)}”</b></div>`:''}<div class="row"><span>${tr('pickup')}</span><b>${esc(dateText(x.pickup_date,x.pickup_time))}</b></div></div>${x.courier?`<div class="notice courier">${tr('courier')}</div>`:''}</section>
      <section class="card"><div class="money-grid"><div class="money"><span>${tr('total')}</span><b>${money(x.price)}</b></div><div class="money"><span>${tr('deposit')}</span><b>${money(x.deposit)}</b></div></div><p class="instruction">${tr('intro')}</p>${payMethod(tr('mbway'),[x.mbway,x.mbway_name].filter(Boolean).join(' · '),'mbway')}${payMethod(tr('iban'),x.iban,'iban')}<div class="notice">${tr('after')}</div>${accepted?`<div class="notice"><b>${tr('acceptedTitle')}</b><br>${tr('accepted')}</div>`:`<div class="actions"><button class="btn primary" onclick="respond('accepted')">${tr('accept')}</button><button class="btn secondary" onclick="respond('cancelled')">${tr('cancel')}</button></div>`}<div class="expiry">${tr('expires')}: <span id="countdown"></span></div></section>`;tick();}
    function payMethod(label,value,id){return `<div class="pay-method"><div><small>${esc(label)}</small><code>${esc(value||'—')}</code></div><button class="copy" id="${id}Btn" onclick="copyValue('${id}',decodeURIComponent('${encodeURIComponent(value||'')}'))">${tr('copy')}</button></div>`;}
    function copyValue(id,value){const done=()=>{const b=document.getElementById(id+'Btn');if(b){b.textContent=tr('copied');setTimeout(()=>b.textContent=tr('copy'),1400);}};if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(value).then(done).catch(()=>fallback(value,done));else fallback(value,done);}
    function fallback(value,done){const t=document.createElement('textarea');t.value=value;t.style.position='fixed';t.style.opacity='0';document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();done();}
    function tick(){const el=document.getElementById('countdown');if(!el)return;const ms=new Date(order.expires_at)-new Date();if(ms<=0){location.reload();return;}const h=Math.floor(ms/3600000),m=Math.floor(ms%3600000/60000);el.textContent=`${h}h ${m}m`;setTimeout(tick,30000);}
    async function respond(decision){if(decision==='cancelled'&&!confirm(lang==='pt'?'Tem a certeza de que deseja cancelar esta encomenda?':'Are you sure you want to cancel this order?'))return;const {data,error}=await sb.rpc('respond_order_portal',{p_token:token,p_decision:decision});if(error){alert(tr('error'));return;}if(decision==='accepted'){order.customer_decision='accepted';render();}else app.innerHTML=`<section class="card state"><h2>${tr('cancelledTitle')}</h2><p>${tr('cancelled')}</p></section>`;}
    async function init(){if(!token){showInvalid();return;}const {data,error}=await sb.rpc('get_order_portal',{p_token:token});if(error||!data){showInvalid();return;}order=typeof data==='string'?JSON.parse(data):data;lang=String(order.language).toUpperCase()==='PT'?'pt':'en';if(order.customer_decision==='cancelled'){app.innerHTML=`<section class="card state"><h2>${tr('cancelledTitle')}</h2><p>${tr('cancelled')}</p></section>`;return;}render();}
    function showInvalid(){app.innerHTML=`<section class="card state"><h2>${tr('invalidTitle')}</h2><p>${tr('invalid')}</p></section>`;}
    init();
  </script>
</body>
</html>
